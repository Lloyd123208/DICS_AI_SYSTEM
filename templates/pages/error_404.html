{% extends 'pages/base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5 text-center">
                <div class="display-1 fw-bold text-primary mb-3">404</div>
                <h2 class="h4 mb-3">The page you requested could not be found.</h2>
                <p class="text-muted mb-4">The link may be outdated or the page may have moved. You can return to the dashboard or try another route.</p>
                <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Go to Dashboard</a>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
